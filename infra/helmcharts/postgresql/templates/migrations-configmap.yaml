{{- if .Values.migrations }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgresql.fullname" . }}-migrations
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
data:
{{- range $filename, $content := .Values.migrations }}
  {{ $filename }}: |
{{ $content | indent 4 }}
{{- end }}
{{- end }}
