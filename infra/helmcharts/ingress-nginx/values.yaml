ingress-nginx:
  controller:
    replicaCount: 2
    allowSnippetAnnotations: true
    config:
      use-http2: "true"
      http2-max-field-size: 16k
      http2-max-header-size: 32k
ingress:
  enabled: true
  name: ingress-main
  namespace: default
  tls:
    enabled: true
    secretName: supreme-tls-cert
    hosts:
      - sewaca.ru
      - diploma.sewaca.ru
      - tastefood.sewaca.ru
  rules:
    - service: core-applications
      port: 80
      type: fastapi
      paths:
        - path: /core-applications/applications
          method: GET
        - path: /core-applications/applications/notifications
          method: GET
        - path: /core-applications/dormitory/applications
          method: POST
        - path: /core-applications/dormitory/parent-agreement
          method: POST
        - path: /core-applications/orders
          method: GET
        - path: /core-applications/orders/[^/]+
          method: GET
        - path: /core-applications/orders/[^/]+/pdf
          method: GET
        - path: /core-applications/orders/counts
          method: GET
        - path: /core-applications/references
          method: GET
        - path: /core-applications/references/[^/]+
          method: GET
        - path: /core-applications/references/[^/]+/cancel
          method: POST
        - path: /core-applications/references/[^/]+/extend-storage
          method: POST
        - path: /core-applications/references/[^/]+/pdf
          method: GET
        - path: /core-applications/references/order
          method: POST
    - service: core-auth
      port: 80
      type: fastapi
      paths:
        - path: /core-auth/auth/caldav-tokens
          method: GET
        - path: /core-auth/auth/caldav-tokens
          method: POST
        - path: /core-auth/auth/caldav-tokens/[^/]+
          method: DELETE
        - path: /core-auth/auth/challenge
          method: POST
        - path: /core-auth/auth/challenge/[^/]+/check
          method: GET
        - path: /core-auth/auth/challenge/[^/]+/verify
          method: POST
        - path: /core-auth/auth/forgot-password
          method: POST
        - path: /core-auth/auth/forgot-password/[^/]+/reset
          method: POST
        - path: /core-auth/auth/forgot-password/[^/]+/verify
          method: POST
        - path: /core-auth/auth/internal/caldav-tokens/validate/[^/]+
          method: GET
        - path: /core-auth/auth/internal/users/[^/]+/email
          method: PATCH
        - path: /core-auth/auth/internal/users/[^/]+/password
          method: PATCH
        - path: /core-auth/auth/login
          method: POST
        - path: /core-auth/auth/me
          method: GET
        - path: /core-auth/auth/register
          method: POST
        - path: /core-auth/auth/sessions
          method: GET
        - path: /core-auth/auth/sessions/[^/]+
          method: DELETE
        - path: /core-auth/auth/validate-session
          method: POST
    - service: core-client-info
      port: 80
      type: fastapi
      paths:
        - path: /core-client-info/profile/groups
          method: GET
        - path: /core-client-info/profile/personal-data
          method: GET
        - path: /core-client-info/profile/user
          method: GET
        - path: /core-client-info/profile/users-by-group
          method: GET
        - path: /core-client-info/profile/users/batch
          method: POST
        - path: /core-client-info/rating/achievements
          method: GET
        - path: /core-client-info/rating/grade-improvements
          method: GET
        - path: /core-client-info/rating/grades
          method: GET
        - path: /core-client-info/rating/level
          method: GET
        - path: /core-client-info/rating/rankings
          method: GET
        - path: /core-client-info/rating/stats
          method: GET
        - path: /core-client-info/rating/streak
          method: GET
        - path: /core-client-info/settings
          method: GET
        - path: /core-client-info/settings
          method: PUT
        - path: /core-client-info/settings/email
          method: POST
        - path: /core-client-info/settings/password
          method: POST
        - path: /core-client-info/subjects/choices
          method: GET
        - path: /core-client-info/subjects/save-priorities
          method: POST
        - path: /core-client-info/subjects/user-priorities/[^/]+
          method: GET
    - service: core-messages
      port: 80
      type: fastapi
      paths:
        - path: /core-messages/broadcasts
          method: GET
        - path: /core-messages/broadcasts
          method: POST
        - path: /core-messages/broadcasts/groups
          method: GET
        - path: /core-messages/conversations
          method: GET
        - path: /core-messages/conversations/[^/]+
          method: DELETE
        - path: /core-messages/conversations/[^/]+
          method: GET
        - path: /core-messages/conversations/[^/]+/messages
          method: GET
        - path: /core-messages/conversations/[^/]+/messages
          method: POST
        - path: /core-messages/conversations/[^/]+/messages/read
          method: POST
        - path: /core-messages/conversations/direct
          method: POST
        - path: /core-messages/conversations/updates
          method: GET
        - path: /core-messages/files
          method: POST
        - path: /core-messages/messages/search
          method: GET
        - path: /core-messages/users/[^/]+
          method: GET
        - path: /core-messages/users/search
          method: GET
    - service: core-recipes-bff
      port: 80
      type: nest
      paths:
        - path: /core-recipes-bff/api/status
          method: GET
        - path: /core-recipes-bff/recipes
          method: GET
        - path: /core-recipes-bff/recipes/[^/]+
          method: DELETE
        - path: /core-recipes-bff/recipes/[^/]+
          method: GET
        - path: /core-recipes-bff/recipes/[^/]+
          method: PUT
        - path: /core-recipes-bff/recipes/[^/]+/like
          method: POST
        - path: /core-recipes-bff/recipes/propose
          method: POST
        - path: /core-recipes-bff/recipes/proposed/[^/]+/publish
          method: POST
        - path: /core-recipes-bff/recipes/proposed/all
          method: GET
    - service: core-schedule
      port: 80
      type: fastapi
      paths:
        - path: /core-schedule/admin/classrooms
          method: GET
        - path: /core-schedule/admin/classrooms
          method: POST
        - path: /core-schedule/admin/classrooms/[^/]+
          method: DELETE
        - path: /core-schedule/admin/classrooms/[^/]+
          method: GET
        - path: /core-schedule/admin/classrooms/[^/]+
          method: PUT
        - path: /core-schedule/admin/overrides
          method: GET
        - path: /core-schedule/admin/overrides
          method: POST
        - path: /core-schedule/admin/overrides/[^/]+
          method: DELETE
        - path: /core-schedule/admin/overrides/[^/]+
          method: PUT
        - path: /core-schedule/admin/semesters
          method: GET
        - path: /core-schedule/admin/semesters
          method: POST
        - path: /core-schedule/admin/semesters/[^/]+
          method: DELETE
        - path: /core-schedule/admin/semesters/[^/]+
          method: GET
        - path: /core-schedule/admin/semesters/[^/]+
          method: PUT
        - path: /core-schedule/admin/session-events
          method: GET
        - path: /core-schedule/admin/session-events
          method: POST
        - path: /core-schedule/admin/session-events/[^/]+
          method: DELETE
        - path: /core-schedule/admin/session-events/[^/]+
          method: PUT
        - path: /core-schedule/admin/teachers
          method: GET
        - path: /core-schedule/admin/teachers/sync
          method: POST
        - path: /core-schedule/admin/templates
          method: GET
        - path: /core-schedule/admin/templates
          method: POST
        - path: /core-schedule/admin/templates/[^/]+
          method: DELETE
        - path: /core-schedule/admin/templates/[^/]+
          method: PUT
        - path: /core-schedule/admin/templates/bulk
          method: POST
        - path: /core-schedule/caldav/[^/]+/groups/[^/]+/calendar.ics
          method: GET
        - path: /core-schedule/caldav/[^/]+/teachers/[^/]+/calendar.ics
          method: GET
        - path: /core-schedule/groups/[^/]+/exams
          method: GET
        - path: /core-schedule/groups/[^/]+/schedule
          method: GET
        - path: /core-schedule/groups/[^/]+/template
          method: GET
        - path: /core-schedule/teachers/[^/]+/exams
          method: GET
        - path: /core-schedule/teachers/[^/]+/schedule
          method: GET
        - path: /core-schedule/teachers/[^/]+/template
          method: GET
    - service: frontend
      port: 80
      type: next
      paths:
        - path: /
          method: GET
        - path: /frontend/.*
          method: GET
        - path: /profile-old
          method: GET
        - path: /proposed-recipes
          method: GET
        - path: /recipes/[^/]+
          method: GET
        - path: /submit-recipe
          method: GET
    - service: web-auth-ssr
      port: 80
      type: next
      paths:
        - path: /forgot-password
          method: GET
        - path: /login
          method: GET
        - path: /register
          method: GET
        - path: /web-auth-ssr/.*
          method: GET
    - service: web-documents-ssr
      port: 80
      type: next
      paths:
        - path: /documents/gradebook
          method: GET
        - path: /documents/student-id-card
          method: GET
        - path: /web-documents-ssr/.*
          method: GET
    - service: web-messages-ssr
      port: 80
      type: next
      paths:
        - path: /api/messages/history
          method: GET
        - path: /messages
          method: GET
        - path: /messages/[^/]+
          method: GET
        - path: /messages/broadcast
          method: GET
        - path: /messages/broadcast/new
          method: GET
        - path: /messages/new
          method: GET
        - path: /messages/search
          method: GET
        - path: /web-messages-ssr/.*
          method: GET
    - service: web-profile-ssr
      port: 80
      type: next
      paths:
        - path: /api/undefined-url
          method: GET
        - path: /profile
          method: GET
        - path: /profile/data
          method: GET
        - path: /profile/dormitory
          method: GET
        - path: /profile/orders
          method: GET
        - path: /profile/rating
          method: GET
        - path: /profile/references
          method: GET
        - path: /profile/scholarship
          method: GET
        - path: /profile/scolarship
          method: GET
        - path: /profile/settings
          method: GET
        - path: /profile/settings/change-email
          method: GET
        - path: /profile/settings/change-password
          method: GET
        - path: /profile/subjects-ranking
          method: GET
        - path: /web-profile-ssr/.*
          method: GET
    - service: web-schedule-ssr
      port: 80
      type: next
      paths:
        - path: /api/caldav-setup
          method: POST
        - path: /api/schedule
          method: GET
        - path: /calendar
          method: GET
        - path: /schedule/group
          method: GET
        - path: /web-schedule-ssr/.*
          method: GET
