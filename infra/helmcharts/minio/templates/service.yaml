apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.fullnameOverride }}
  namespace: default
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.fullnameOverride }}
  ports:
    - name: api
      port: {{ .Values.service.port }}
      targetPort: 9000
    - name: console
      port: {{ .Values.service.consolePort }}
      targetPort: 9001
