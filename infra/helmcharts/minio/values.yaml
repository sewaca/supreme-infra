image:
  repository: minio/minio
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: "minio"
fullnameOverride: "minio"

replicas: 1

service:
  type: ClusterIP
  port: 9000
  consolePort: 9001

env:
  MINIO_ROOT_USER: minioadmin

secrets:
  MINIO_ROOT_PASSWORD: MINIO_SECRET_KEY

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /minio/health/live
    port: 9000

readinessProbe:
  httpGet:
    path: /minio/health/ready
    port: 9000
