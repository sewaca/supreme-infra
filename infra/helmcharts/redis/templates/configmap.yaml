apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.fullname" . }}-config
  namespace: default
  labels:
    {{- include "redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    maxmemory {{ .Values.config.maxmemory }}
    maxmemory-policy {{ .Values.config.maxmemoryPolicy }}
    loglevel {{ .Values.config.loglevel | default "notice" }}
    {{- if .Values.config.requirepass }}
    requirepass {{ .Values.config.requirepass }}
    {{- end }}
    save 900 1
    save 300 10
    save 60 10000
    appendonly no
