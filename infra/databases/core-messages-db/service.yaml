# Database configuration for core-messages service
# This file defines database-specific settings including resources
database:
  name: core_messages_db
  user: core_messages_user
  passwordSecret: DB_PASSWORD
resources:
  production:
    limits:
      cpu: 300m
      memory: 300Mi
    requests:
      cpu: 100m
      memory: 150Mi
  development:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
