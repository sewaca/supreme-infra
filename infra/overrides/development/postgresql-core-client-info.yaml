initScript: >
  -- Initial schema for core-client-info database

  -- This script is executed automatically when PostgreSQL starts for the first
  time


  CREATE EXTENSION IF NOT EXISTS "pgcrypto";


  CREATE TABLE IF NOT EXISTS user_settings (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID UNIQUE NOT NULL,
      is_new_message_notifications_enabled BOOLEAN NOT NULL DEFAULT TRUE,
      is_schedule_change_notifications_enabled BOOLEAN NOT NULL DEFAULT TRUE,
      telegram_token VARCHAR,
      vk_token VARCHAR,
      updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE TABLE IF NOT EXISTS student_stats (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID UNIQUE NOT NULL,
      course INTEGER,
      faculty VARCHAR,
      specialty VARCHAR,
      direction VARCHAR,
      profile VARCHAR,
      "group" VARCHAR,
      status VARCHAR,
      qualification VARCHAR,
      start_year INTEGER,
      end_year INTEGER,
      student_card_number VARCHAR,
      university VARCHAR,
      average_grade NUMERIC(4, 2),
      education_form VARCHAR,
      updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE TABLE IF NOT EXISTS rating_level (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID UNIQUE NOT NULL,
      level VARCHAR NOT NULL DEFAULT 'novice',
      current_xp INTEGER NOT NULL DEFAULT 0,
      updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE TABLE IF NOT EXISTS ranking_position (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID NOT NULL,
      ranking_type VARCHAR NOT NULL,
      position INTEGER NOT NULL,
      total INTEGER NOT NULL,
      percentile NUMERIC(5, 2) NOT NULL,
      calculated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE INDEX IF NOT EXISTS idx_ranking_position_user_id ON
  ranking_position(user_id);


  CREATE TABLE IF NOT EXISTS user_achievement (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID NOT NULL,
      achievement_id VARCHAR NOT NULL,
      unlocked BOOLEAN NOT NULL DEFAULT FALSE,
      unlocked_at TIMESTAMP WITH TIME ZONE,
      progress INTEGER NOT NULL DEFAULT 0,
      max_progress INTEGER NOT NULL DEFAULT 1,
      times_earned INTEGER NOT NULL DEFAULT 0
  );


  CREATE INDEX IF NOT EXISTS idx_user_achievement_user_id ON
  user_achievement(user_id);


  CREATE TABLE IF NOT EXISTS streak (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID UNIQUE NOT NULL,
      current INTEGER NOT NULL DEFAULT 0,
      best INTEGER NOT NULL DEFAULT 0,
      last_updated TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE TABLE IF NOT EXISTS user_grade (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID NOT NULL,
      subject VARCHAR NOT NULL,
      grade NUMERIC(4, 2) NOT NULL,
      grade_type VARCHAR NOT NULL,
      grade_date TIMESTAMP WITH TIME ZONE NOT NULL,
      created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE INDEX IF NOT EXISTS idx_user_grade_user_id ON user_grade(user_id);


  CREATE TABLE IF NOT EXISTS reference_order (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID NOT NULL,
      reference_type VARCHAR NOT NULL,
      type_label VARCHAR NOT NULL,
      status VARCHAR NOT NULL DEFAULT 'preparation',
      order_date TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
      pickup_point_id VARCHAR,
      virtual_only BOOLEAN NOT NULL DEFAULT FALSE,
      storage_until TIMESTAMP WITH TIME ZONE,
      pdf_url VARCHAR
  );


  CREATE INDEX IF NOT EXISTS idx_reference_order_user_id ON
  reference_order(user_id);


  CREATE TABLE IF NOT EXISTS "order" (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID NOT NULL,
      type VARCHAR NOT NULL,
      number VARCHAR NOT NULL,
      title VARCHAR NOT NULL,
      date DATE NOT NULL,
      additional_fields JSONB,
      pdf_url VARCHAR,
      actions JSONB,
      created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE INDEX IF NOT EXISTS idx_order_user_id ON "order"(user_id);

  CREATE INDEX IF NOT EXISTS idx_order_type ON "order"(type);


  CREATE TABLE IF NOT EXISTS order_notification (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      order_id UUID NOT NULL REFERENCES "order"(id) ON DELETE CASCADE,
      severity VARCHAR NOT NULL,
      message VARCHAR NOT NULL,
      action VARCHAR,
      created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE INDEX IF NOT EXISTS idx_order_notification_order_id ON
  order_notification(order_id);


  CREATE TABLE IF NOT EXISTS subject_choice (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      choice_id VARCHAR UNIQUE NOT NULL,
      deadline_date TIMESTAMP WITH TIME ZONE NOT NULL,
      is_active BOOLEAN NOT NULL DEFAULT TRUE
  );


  CREATE TABLE IF NOT EXISTS user_subject_priority (
      id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id UUID NOT NULL,
      choice_id UUID NOT NULL REFERENCES subject_choice(id) ON DELETE CASCADE,
      subject_id VARCHAR NOT NULL,
      priority INTEGER NOT NULL,
      updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
  );


  CREATE INDEX IF NOT EXISTS idx_user_subject_priority_user_id ON
  user_subject_priority(user_id);
