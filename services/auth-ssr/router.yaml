# This file is automatically generated and should not be edited manually!
# Routes are extracted from Next.js app/ directory; auth_level is manually maintained.
# Use pnpm run generate:router to update this file

service: auth-ssr
type: next
routes:
  - path: /auth-ssr/.*
    method: GET
    auth_level: none
  - path: /forgot-password-old
    method: GET
    auth_level: none
  - path: /login-old
    method: GET
    auth_level: none
  - path: /profile-old
    method: GET
    auth_level: valid
  - path: /profile-old/[^/]+
    method: GET
    auth_level: valid
  - path: /register-old
    method: GET
    auth_level: none
