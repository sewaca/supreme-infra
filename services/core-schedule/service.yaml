image:
  repository: core-schedule

nameOverride: "core-schedule"
fullnameOverride: "core-schedule"

replicas: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8003

metrics:
  enabled: true
  port: 9464

env:
  PORT: "8003"
  PYTHON_ENV: "production"
  DB_HOST: "pgbouncer-core-schedule"
  DB_PORT: "5432"
  DB_NAME: "core_schedule_db"
  DB_USER: "core_schedule_user"
  # DB_PASSWORD is passed from GitHub Secrets during deployment

livenessProbe:
  httpGet:
    path: /core-schedule/api/status

readinessProbe:
  httpGet:
    path: /core-schedule/api/status

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 300Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

overrides:
  production:
    canary:
      enabled: true
