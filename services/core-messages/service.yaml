image:
  repository: core-messages

nameOverride: "core-messages"
fullnameOverride: "core-messages"

replicas: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8006

metrics:
  enabled: true
  port: 9464

secrets:
  DB_PASSWORD: DB_PASSWORD
  S3_ACCESS_KEY: MINIO_ACCESS_KEY
  S3_SECRET_KEY: MINIO_SECRET_KEY

env:
  PORT: "8006"
  PYTHON_ENV: "production"
  DB_HOST: "pgbouncer-core-messages"
  DB_PORT: "5432"
  DB_NAME: "core_messages_db"
  DB_USER: "core_messages_user"
  CORE_AUTH_URL: "http://core-auth.default.svc.cluster.local/core-auth"
  CORE_CLIENT_INFO_URL: "http://core-client-info.default.svc.cluster.local/core-client-info"
  S3_ENDPOINT: "http://minio.default.svc.cluster.local:9000"
  S3_BUCKET: "messages-attachments"

livenessProbe:
  httpGet:
    path: /core-messages/status

readinessProbe:
  httpGet:
    path: /core-messages/status

resources:
  limits:
    cpu: 300m
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 300Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

overrides:
  production:
    canary:
      enabled: true
