image:
  repository: core-applications

nameOverride: "core-applications"
fullnameOverride: "core-applications"

replicas: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8001

metrics:
  enabled: true
  port: 9464

env:
  PORT: "8001"
  PYTHON_ENV: "production"
  DB_HOST: "pgbouncer-core-applications"
  DB_PORT: "5432"
  DB_NAME: "core_applications_db"
  DB_USER: "core_applications_user"

livenessProbe:
  httpGet:
    path: /core-applications/status

readinessProbe:
  httpGet:
    path: /core-applications/status

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 150m
    memory: 300Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

overrides:
  production:
    canary:
      enabled: true
