# This file is automatically generated and should not be edited manually!
# Routes are extracted from Next.js app/ directory; auth_level is manually maintained.
# Use pnpm run generate:router to update this file

service: frontend
type: next
routes:
  - path: /
    method: GET
    auth_level: none
  - path: /frontend/.*
    method: GET
    auth_level: none
  - path: /proposed-recipes
    method: GET
    auth_level: valid
  - path: /recipes/[^/]+
    method: GET
    auth_level: valid
  - path: /submit-recipe
    method: GET
    auth_level: valid
