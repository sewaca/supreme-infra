# Конфигурация для frontend сервиса
# Используется при деплое через: helm install frontend ./infra/helmcharts/frontend-service -f services/frontend/service.yaml

image:
  repository: frontend

nameOverride: "frontend"
fullnameOverride: "frontend"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

metrics:
  enabled: true
  port: 9464

env:
  PORT: "3000"
  NODE_ENV: "production"
  BACKEND_SERVICE_NAMESPACE: "default"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 300m
    memory: 300Mi

# HPA настройки для frontend
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# Переопределения для конкретных окружений
overrides:
  production:
    canary:
      enabled: true
