# Конфигурация для web-profile-ssr сервиса
# Используется при деплое через: helm install web-profile-ssr ./infra/helmcharts/frontend-service -f services/web-profile-ssr/service.yaml

image:
  repository: web-profile-ssr

nameOverride: "web-profile-ssr"
fullnameOverride: "web-profile-ssr"

service:
  type: ClusterIP
  port: 80
  targetPort: 3005

metrics:
  enabled: true
  port: 9464

env:
  PORT: "3005"
  NODE_ENV: "production"
  BACKEND_SERVICE_NAMESPACE: "default"
  CORE_APPLICATIONS_URL: "http://core-applications.default.svc.cluster.local/core-applications"
  CORE_CLIENT_INFO_URL: "http://core-client-info.default.svc.cluster.local/core-client-info"
  CORE_AUTH_URL: "http://core-auth.default.svc.cluster.local/core-auth"

resources:
  limits:
    cpu: 600m
    memory: 512Mi
  requests:
    cpu: 180m
    memory: 300Mi

# HPA настройки для frontend
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# Переопределения для конкретных окружений
overrides:
  production:
    canary:
      enabled: true
