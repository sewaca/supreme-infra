services:
  nest:
    - name: core-recipes-bff
      description: "recipes backend "
      database:
        enabled: true
        name: core_recipes_bff_db
        user: core_recipes_bff_user
        passwordSecret: DB_PASSWORD
  next:
    - name: frontend
      description: Frontend service (Next.js)
    - name: web-documents-ssr
      description: "documents presentation "
    - name: web-profile-ssr
      description: "profile "
    - name: web-auth-ssr
      description: Auth pages — login and register
    - name: web-schedule-ssr
      description: Сервис для просмотра расписания для студентов и преподавателей
    - name: web-messages-ssr
      description: Отображение сообщений
  fastapi:
    - name: core-auth
      description: Authentication — login, JWT tokens, 2FA
      database:
        enabled: true
        name: core_auth_db
        user: core_auth_user
        passwordSecret: DB_PASSWORD
    - name: core-client-info
      description: Client information — profile, settings, ratings, achievements
      database:
        enabled: true
        name: core_client_info_db
        user: core_client_info_user
        passwordSecret: DB_PASSWORD
    - name: core-applications
      description: Applications — user applications, references, orders, dormitory
      database:
        enabled: true
        name: core_applications_db
        user: core_applications_user
        passwordSecret: DB_PASSWORD
    - name: core-schedule
      description: Schedule — university timetable, templates, overrides
      database:
        enabled: true
        name: core_schedule_db
        user: core_schedule_user
        passwordSecret: DB_PASSWORD
    - name: core-messages
      description: Messaging — direct messages, broadcasts, file attachments
      database:
        enabled: true
        name: core_messages_db
        user: core_messages_user
        passwordSecret: DB_PASSWORD
    - name: system-files-storage
      description: File storage service — upload files to MinIO, generate thumbnails
