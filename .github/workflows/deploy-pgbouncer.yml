name: Deploy PgBouncer
on:
  workflow_dispatch:
    inputs:
      service:
        description: Select service to deploy PgBouncer for
        required: true
        type: choice
        options:
          - core-auth
          - core-recipes-bff
          - core-client-info
          - core-applications
        default: core-auth
      action:
        description: Deployment action
        required: true
        type: choice
        options:
          - install
          - upgrade
          - uninstall
        default: upgrade
env:
  HELM_VERSION: v3.16.3
jobs:
  validate-service:
    name: Validate service configuration
    runs-on: ubuntu-latest
    outputs:
      has_database: ${{ steps.check.outputs.has_database }}
      db_name: ${{ steps.check.outputs.db_name }}
      db_user: ${{ steps.check.outputs.db_user }}
      release_name: ${{ steps.check.outputs.release_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Check if service has database enabled
        id: check
        env:
          SERVICE_NAME: ${{ github.event.inputs.service }}
        run: |
          echo "Checking database configuration for service: $SERVICE_NAME"

          # Check in nest services
          DB_ENABLED=$(yq eval ".services.nest[] | select(.name == \"$SERVICE_NAME\") | .database.enabled" services.yaml)

          # If not found in nest, check next services
          if [ -z "$DB_ENABLED" ] || [ "$DB_ENABLED" = "null" ]; then
            DB_ENABLED=$(yq eval ".services.next[] | select(.name == \"$SERVICE_NAME\") | .database.enabled" services.yaml)
          fi

          # If not found in next, check fastapi services
          if [ -z "$DB_ENABLED" ] || [ "$DB_ENABLED" = "null" ]; then
            DB_ENABLED=$(yq eval ".services.fastapi[] | select(.name == \"$SERVICE_NAME\") | .database.enabled" services.yaml)
          fi

          if [ "$DB_ENABLED" != "true" ]; then
            echo "Error: Service $SERVICE_NAME does not have database enabled"
            exit 1
          fi

          # Get database name and user from services.yaml
          DB_NAME=$(yq eval ".services.nest[] | select(.name == \"$SERVICE_NAME\") | .database.name" services.yaml)
          if [ -z "$DB_NAME" ] || [ "$DB_NAME" = "null" ]; then
            DB_NAME=$(yq eval ".services.next[] | select(.name == \"$SERVICE_NAME\") | .database.name" services.yaml)
          fi
          if [ -z "$DB_NAME" ] || [ "$DB_NAME" = "null" ]; then
            DB_NAME=$(yq eval ".services.fastapi[] | select(.name == \"$SERVICE_NAME\") | .database.name" services.yaml)
          fi
          if [ -z "$DB_NAME" ] || [ "$DB_NAME" = "null" ]; then
            DB_NAME="${SERVICE_NAME}_db"
          fi

          DB_USER=$(yq eval ".services.nest[] | select(.name == \"$SERVICE_NAME\") | .database.user" services.yaml)
          if [ -z "$DB_USER" ] || [ "$DB_USER" = "null" ]; then
            DB_USER=$(yq eval ".services.next[] | select(.name == \"$SERVICE_NAME\") | .database.user" services.yaml)
          fi
          if [ -z "$DB_USER" ] || [ "$DB_USER" = "null" ]; then
            DB_USER=$(yq eval ".services.fastapi[] | select(.name == \"$SERVICE_NAME\") | .database.user" services.yaml)
          fi
          if [ -z "$DB_USER" ] || [ "$DB_USER" = "null" ]; then
            DB_USER="${SERVICE_NAME}_user"
          fi

          RELEASE_NAME="pgbouncer-${SERVICE_NAME}"

          echo "PgBouncer configuration:"
          echo "  Database name: $DB_NAME"
          echo "  Database user: $DB_USER"
          echo "  Release name: $RELEASE_NAME"

          echo "has_database=true" >> $GITHUB_OUTPUT
          echo "db_name=$DB_NAME" >> $GITHUB_OUTPUT
          echo "db_user=$DB_USER" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
  deploy-pgbouncer:
    name: Deploy PgBouncer for ${{ github.event.inputs.service }}
    needs: validate-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Yandex Cloud
        uses: ./.github/workflows/jobs/setup-yandex-cloud
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          yc-cloud-id: ${{ secrets.YC_CLOUD_ID }}
          yc-folder-id: ${{ secrets.YC_FOLDER_ID }}
          yc-k8s-cluster-id: ${{ secrets.YC_K8S_CLUSTER_ID }}
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Check if release exists
        id: check-release
        env:
          RELEASE_NAME: ${{ needs.validate-service.outputs.release_name }}
          NAMESPACE: default
        run: |
          STATUS=$(helm list -n "$NAMESPACE" --filter "^$RELEASE_NAME$" -o json | jq -r '.[0].status // "not_found"')
          if [ "$STATUS" = "not_found" ] || [ "$STATUS" = "null" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "status=not_found" >> $GITHUB_OUTPUT
            echo "Release $RELEASE_NAME does not exist in namespace $NAMESPACE"
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "Release $RELEASE_NAME exists in namespace $NAMESPACE (status: $STATUS)"
          fi
      - name: Install PgBouncer
        if: github.event.inputs.action == 'install'
        env:
          SERVICE_NAME: ${{ github.event.inputs.service }}
          RELEASE_NAME: ${{ needs.validate-service.outputs.release_name }}
          NAMESPACE: default
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXISTS: ${{ steps.check-release.outputs.exists }}
          RELEASE_STATUS: ${{ steps.check-release.outputs.status }}
        run: |
          VALUES_FILE="infra/overrides/production/pgbouncer-${SERVICE_NAME}.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Error: Values file not found: $VALUES_FILE"
            echo "Please run 'pnpm run generate' to create it"
            exit 1
          fi

          # Clean up failed release before reinstalling
          if [ "$EXISTS" = "true" ] && [ "$RELEASE_STATUS" = "failed" ]; then
            echo "Found failed release, uninstalling before reinstall..."
            helm uninstall "$RELEASE_NAME" --namespace "$NAMESPACE" --wait || true
          elif [ "$EXISTS" = "true" ] && [ "$RELEASE_STATUS" = "deployed" ]; then
            echo "Release $RELEASE_NAME is already deployed. Use 'upgrade' action instead."
            exit 0
          fi

          echo "Installing PgBouncer for $SERVICE_NAME in default namespace"

          helm install "$RELEASE_NAME" ./infra/helmcharts/pgbouncer \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set database.password="$DB_PASSWORD" \
            -f "$VALUES_FILE" \
            --wait \
            --timeout 3m

          echo "PgBouncer installed successfully"
      - name: Upgrade PgBouncer
        if: github.event.inputs.action == 'upgrade'
        env:
          SERVICE_NAME: ${{ github.event.inputs.service }}
          RELEASE_NAME: ${{ needs.validate-service.outputs.release_name }}
          NAMESPACE: default
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXISTS: ${{ steps.check-release.outputs.exists }}
        run: |
          VALUES_FILE="infra/overrides/production/pgbouncer-${SERVICE_NAME}.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "Error: Values file not found: $VALUES_FILE"
            echo "Please run 'pnpm run generate' to create it"
            exit 1
          fi

          if [ "$EXISTS" = "false" ]; then
            echo "Release does not exist, installing instead of upgrading..."
            helm install "$RELEASE_NAME" ./infra/helmcharts/pgbouncer \
              --namespace "$NAMESPACE" \
              --create-namespace \
              --set database.password="$DB_PASSWORD" \
              -f "$VALUES_FILE" \
              --wait \
              --timeout 3m
            echo "PgBouncer installed successfully"
          else
            echo "Upgrading PgBouncer for $SERVICE_NAME in default namespace"
            helm upgrade "$RELEASE_NAME" ./infra/helmcharts/pgbouncer \
              --namespace "$NAMESPACE" \
              --set database.password="$DB_PASSWORD" \
              -f "$VALUES_FILE" \
              --wait \
              --timeout 3m
            echo "PgBouncer upgraded successfully"
          fi
      - name: Uninstall PgBouncer
        if: github.event.inputs.action == 'uninstall'
        env:
          RELEASE_NAME: ${{ needs.validate-service.outputs.release_name }}
          NAMESPACE: default
          EXISTS: ${{ steps.check-release.outputs.exists }}
        run: |
          if [ "$EXISTS" = "false" ]; then
            echo "Release $RELEASE_NAME does not exist, nothing to uninstall"
            exit 0
          fi

          echo "Uninstalling PgBouncer: $RELEASE_NAME from namespace $NAMESPACE"

          helm uninstall "$RELEASE_NAME" --namespace "$NAMESPACE" --wait

          echo "PgBouncer uninstalled successfully"
      - name: Verify deployment
        if: github.event.inputs.action != 'uninstall'
        env:
          RELEASE_NAME: ${{ needs.validate-service.outputs.release_name }}
          NAMESPACE: default
        run: |
          echo "Verifying PgBouncer deployment..."

          # Wait for pod to be ready (nameOverride = pgbouncer-{service}, so use instance label)
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/instance="$RELEASE_NAME" \
            -n "$NAMESPACE" \
            --timeout=120s

          # Get pod name
          POD_NAME=$(kubectl get pods \
            -l app.kubernetes.io/instance="$RELEASE_NAME" \
            -n "$NAMESPACE" \
            -o jsonpath='{.items[0].metadata.name}')

          echo "Pod name: $POD_NAME"
          echo "Verification completed successfully"
  post-deployment-info:
    name: Post-deployment information
    needs:
      - validate-service
      - deploy-pgbouncer
    if: always() && needs.deploy-pgbouncer.result == 'success' &&
      github.event.inputs.action != 'uninstall'
    runs-on: ubuntu-latest
    steps:
      - name: Display connection information
        env:
          SERVICE_NAME: ${{ github.event.inputs.service }}
          RELEASE_NAME: ${{ needs.validate-service.outputs.release_name }}
          DB_NAME: ${{ needs.validate-service.outputs.db_name }}
          DB_USER: ${{ needs.validate-service.outputs.db_user }}
          NAMESPACE: default
        run: |
          echo "PgBouncer Deployment Successful"
          echo ""
          echo "PgBouncer Information:"
          echo "  Service: $SERVICE_NAME"
          echo "  Release: $RELEASE_NAME"
          echo "  Namespace: $NAMESPACE"
          echo ""
          echo "Connection Details:"
          echo "  Host: ${RELEASE_NAME}.${NAMESPACE}.svc.cluster.local"
          echo "  Port: 5432"
          echo "  Database: $DB_NAME"
          echo "  User: $DB_USER"
          echo "  Upstream: postgresql-${SERVICE_NAME}"
          echo ""
          echo "Next Steps:"
          echo "  1. Services using DB_HOST: pgbouncer-${SERVICE_NAME} will route through PgBouncer"
          echo "  2. Deploy/redeploy the service to pick up the new DB_HOST"
