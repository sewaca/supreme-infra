name: "FastAPI Application Security Check"
description: "Run security scan for FastAPI Python application"

inputs:
  service-name:
    description: "Service name"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv sync --frozen
      shell: bash
      working-directory: services/${{ inputs.service-name }}
    - name: Security check with pip-audit
      # CVE-2026-4539: no fix available for pygments 2.19.2 yet — ignore until patch is released
      run: uv run pip-audit --ignore-vuln CVE-2026-4539
      shell: bash
      working-directory: services/${{ inputs.service-name }}
    - name: Security check with bandit
      run: uv run bandit -r app/ -ll
      shell: bash
      working-directory: services/${{ inputs.service-name }}
